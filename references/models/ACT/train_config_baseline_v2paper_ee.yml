# ACT baseline with end-effector Cartesian pose actions.
# State/action layout: [ee_x, ee_y, ee_z, ee_qw, ee_qx, ee_qy, ee_qz, gripper_qpos].
state_dim: 8
control_mode: ee
state_repr: ee
kl_weight: 10.0
chunk_size: 50
hidden_dim: 512
dim_feedforward: 3200

temporal_agg: true
device: cuda:0

ckpt_dir: null
policy_class: ACT
num_steps: 4000

batch_size: 64
num_workers: 0
save_freq: 1000
position_embedding: sine
lr_vision_backbone: 0.00001
weight_decay: 0.0001
lr: 0.00001
masks: false
dilation: false
backbone: resnet18
nheads: 8
enc_layers: 4
dec_layers: 7
pre_norm: false
dropout: 0.1
camera_names:
  - cam_high

tactile_names:
  - tac_left
  - tac_right
lr_tactile_backbone: 0.00001
tactile_masks: false
tactile_backbone: resnet18
tactile_ckpt: null
tactile_dilation: false
