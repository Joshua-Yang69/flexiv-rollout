# ACT + cached ViTacDreamer tactile2depth feature-only tactile config
state_dim: 8
kl_weight: 10.0
chunk_size: 50
hidden_dim: 512
dim_feedforward: 3200

temporal_agg: true
device: cuda:0

# DETR parser args
ckpt_dir: null
policy_class: ACT
num_steps: 4000

# Model training params
batch_size: 64
num_workers: 0
save_freq: 2000
position_embedding: sine
lr_vision_backbone: 0.00001
weight_decay: 0.0001
lr: 0.00001
masks: false
dilation: false
backbone: resnet18
nheads: 8
enc_layers: 4
dec_layers: 7
pre_norm: false
dropout: 0.1
camera_names:
  - cam_high

# tactile args
tactile_names: []
lr_tactile_backbone: 0.00001
tactile_masks: false
tactile_backbone: resnet18
tactile_ckpt: null
tactile_dilation: false

# ViTacDreamer tactile2depth cached feature args
use_vitacdreamer_feature: true
vitacdreamer_history_len: 5
vitacdreamer_feature_dim: 256
vitacdreamer_cross_attn_layers: middle
vitacdreamer_checkpoint: /inspire/hdd/global_user/yangyi-253108120173/inspire_shared/mount/advanced-machine-learning-and-deep-learning-applications/lzh/ksq/joshua/ViTacDreamer/checkpoints/vitacdreamer/stage2_tactile2depth_bilateral_concat_noaction/stage2_tactile2depth_bilateral_concat_noaction_encoder_only.pth
vitacdreamer_feature_cache_dir: ./data/act_processed/{task_stem}/{task_config_ep}/vitacdreamer_features_stage2_tactile2depth_bilateral_concat_noaction
vitacdreamer_adapter_lr: 0.0001
vitacdreamer_gate_init: 0.0
