# ACT + raw tactile + online ViTacDreamer tactile2depth encoder finetuning config
state_dim: 8
kl_weight: 10.0
chunk_size: 50
hidden_dim: 512
dim_feedforward: 3200

temporal_agg: true
device: cuda:0

# DETR parser args
ckpt_dir: null
policy_class: ACT
num_steps: 16000

# Model training params
batch_size: 16
num_workers: 0
save_freq: 4000
position_embedding: sine
lr_vision_backbone: 0.00001
weight_decay: 0.0001
lr: 0.00001
masks: false
dilation: false
backbone: resnet18
nheads: 8
enc_layers: 4
dec_layers: 7
pre_norm: false
dropout: 0.1
camera_names:
  - cam_high

# Keep ACT's original raw tactile branch as the fair baseline input.
tactile_names:
  - tac_left
  - tac_right
lr_tactile_backbone: 0.00001
tactile_masks: false
tactile_backbone: resnet18
tactile_ckpt: null
tactile_dilation: false

# Online ViTacDreamer tactile2depth feature path. Do not set
# vitacdreamer_feature_cache_dir here; finetuning requires encoder gradients.
use_vitacdreamer_feature: true
finetune_vitacdreamer_encoder: true
vitacdreamer_history_len: 5
vitacdreamer_feature_dim: 256
vitacdreamer_cross_attn_layers: middle
vitacdreamer_checkpoint: ../../../checkpoints/vitacdreamer/stage2_tactile2depth_bilateral_concat_noaction/stage2_tactile2depth_bilateral_concat_noaction_encoder_only.pth
vitacdreamer_task_order:
  - insert_HDMI
  - insert_hole
  - lift_bottle
  - pull_out_key
vitacdreamer_encoder_lr: 0.000001
vitacdreamer_adapter_lr: 0.0001
vitacdreamer_gate_init: 0.0
