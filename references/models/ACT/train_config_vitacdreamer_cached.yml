# ACT + cached ViTacDreamer-feature baseline
state_dim: 8
kl_weight: 10.0
chunk_size: 50
hidden_dim: 512
dim_feedforward: 3200

temporal_agg: true
device: cuda:0

# DETR parser args
ckpt_dir: null
policy_class: ACT
num_steps: 4000

# Model training params
batch_size: 256
num_workers: 0
save_freq: 2000
position_embedding: sine
lr_vision_backbone: 0.0
weight_decay: 0.0001
lr: 0.00001
masks: false
dilation: false
backbone: resnet18
nheads: 8
enc_layers: 4
dec_layers: 7
pre_norm: false
dropout: 0.1
camera_names: []

# tactile args
tactile_names:
  - tac_left
  - tac_right
lr_tactile_backbone: 0.00001
tactile_masks: false
tactile_backbone: resnet18
tactile_ckpt: null
tactile_dilation: false

# ViTacDreamer feature args
use_vitacdreamer_feature: true
vitacdreamer_history_len: 5
vitacdreamer_feature_dim: 256
vitacdreamer_cross_attn_layers: middle
vitacdreamer_checkpoint: ./checkpoints/vitacdreamer/lift_bottle_stage2/stage2_best.pth
vitacdreamer_feature_cache_dir: ./data/act_processed/default-50/vitacdreamer_features_stage2
