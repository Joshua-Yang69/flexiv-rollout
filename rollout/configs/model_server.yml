runtime:
  fps: 30
  observation_timeout_s: 1
  publish_hold_on_error: false

policy:
  # type: constant_hold | act | vt_muse
  type: vt_muse

  act:
    device: cuda:0
    control_mode: joint   # "joint" | "tcp"
    camera_names:
      - cam_high
    tactile_names: []
      # - tac_left
      # - tac_right
    image_size: 256
    normalize_visual: true
    model_args:
      # Required fields passed directly to ACT.__init__
      device: cuda:0
      chunk_size: 15
      state_dim: 8
      kl_weight: 7.5
      policy_class: ACT
      task_name: flexiv_rollout
      seed: 0
      num_epochs: 1
      # Checkpoint directory (contains policy_best.ckpt and dataset_stats.pkl)
      ckpt_dir: "/home/xense/MUSE_workspace/flexiv-rollout/rollout/models/ViTacDreamer_real_ACT_baselines_20260713/vision_only/insert_tube"
      # Optional explicit paths (override ckpt_dir defaults)
      # policy_checkpoint: ""
      # stats_path: ""
      camera_names:
        - cam_high
      tactile_names: []
        # - tac_left
        # - tac_right
      temporal_agg: true
      # ViTacDreamer feature fusion (set use_vitacdreamer_feature: true to enable)
      use_vitacdreamer_feature: false
      hidden_dim: 512
      dim_feedforward: 3200
      backbone: resnet18
      nheads: 8
      enc_layers: 4
      dec_layers: 7
      dropout: 0.025
      position_embedding: sine
      pre_norm: false
      dilation: false
      masks: false
      lr_vision_backbone: 0.0
      lr_tactile_backbone: 0.0
      # vitacdreamer_checkpoint: ""

  vt_muse:
    # Path to trained ViTacDreamer Stage-2 encoder-only checkpoint (required)
    checkpoint: "/home/xense/MUSE_workspace/flexiv-rollout/rollout/models/checkpoints/stage2_prior512_hlen5_depthdelta_80train20val/stage2_v2_encoder_only.pth"
    freeze_encoder: true
    device: cuda:0
    control_mode: joint
    camera_names:
      - cam_high
    tactile_names:
      - tac_left
      - tac_right
    image_size: 224          # ViTacDreamer native resolution (224 x 224)
    # Frame stride for history sampling: 5 frames @ 30 Hz = 6 Hz slots.
    # Must match Stage1/Stage2 training sample_stride=5.
    sample_stride: 5
    # task_id: integer index into the encoder's task embedding table.
    # Real encoder task order: 0=insert_tube, 1=wipe_board
    task_id: 0
    model_args:
      device: cuda:0
      # ── ACT architecture (must match training config) ─────────────────────
      policy_class: ACT
      state_dim: 8                     # joint7 + gripper
      chunk_size: 15                   # training: chunk_size=15
      kl_weight: 7.5                   # training: kl_weight=7.5
      temporal_agg: true               # training: temporal_agg=true
      hidden_dim: 512
      dim_feedforward: 3200
      nheads: 8
      enc_layers: 4
      dec_layers: 7
      dropout: 0.025
      backbone: resnet18
      tactile_ckpt: None
      tactile_backbone: resnet18
      position_embedding: sine
      pre_norm: false
      dilation: false
      tactile_dilation: false
      masks: false
      lr_vision_backbone: 0.0
      lr_tactile_backbone: 0.0
      tactile_masks: false
      # ── ViTacDreamer fusion ───────────────────────────────────────────────
      vitacdreamer_feature_dim: 512    # latent_dim from Stage2 encoder
      vitacdreamer_fusion_mode: feature_query_policy_kv
      vitacdreamer_cross_attn_layers: none
      finetune_vitacdreamer_encoder: false
      # use_vitacdreamer_feature is forced to true by VTMusePolicyAdapter.load()
      # ── checkpoint ───────────────────────────────────────────────────────
      ckpt_dir: "/home/xense/MUSE_workspace/flexiv-rollout/rollout/models/checkpoints/vitac_ckpts/act-insert_tube/real-100/train_config_actbaseline_real2_vision_tactile_100_16k"          # directory with policy_best.ckpt + dataset_stats.pkl
      seed: 0
      num_epochs: 1
      task_name: insert_tube   # used for internal ACT logging; set per task

