runtime:
  fps: 50
  max_state_skew_ms: 5
  publish_visual: true
  publish_tactile: true

arm:
  driver: flexiv
  flexiv:
    robot_id: Rizon4s-063586
    tool_name: xense
    auto_enable: true
    operational_wait_s: 10
    tcp_mode_on_start: true

gripper:
  driver: xense
  mock_width_m: 0.04
  xense:
    device_id: 1659f0e0dde0
    max_width_m: 0.085
    max_velocity_m_s: 0.35
    max_force_n: 60
    blocking_timeout_s: -1
    blocking_tolerance_mm: 1

visual:
  enabled: true
  driver: realsense_d415
  realsense:
    serial: "314522062078"
    width: 640
    height: 480
    fps: 30
    enable_color: true
    enable_depth: true
    align_depth_to_color: true

tactile:
  enabled: true
  driver: xense
  xense:
    # ip_address:
    # config_path:
    # video_path:
    # use_gpu: false
    fps: 30
  sensors:
    xense_left:
      device_id: OG001452
      mac_addr: 1659f0e0dde0
    xense_right:
      device_id: OG001454
      mac_addr: 1659f0e0dde0
