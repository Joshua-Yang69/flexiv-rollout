runtime:
  fps: 30
  max_state_skew_ms: 5
  publish_visual: true
  publish_tactile: true

arm:
  driver: mock
  flexiv:
    robot_id: Rizon4s-063231
    tool_name: Flange
    auto_enable: true
    operational_wait_s: 10
    tcp_mode_on_start: true

gripper:
  driver: mock
  mock_width_m: 0.04
  xense:
    device_id: 5e77ff097831
    max_width_m: 0.085
    max_velocity_m_s: 0.35
    max_force_n: 60
    blocking_timeout_s: -1
    blocking_tolerance_mm: 1

visual:
  enabled: true
  driver: mock
  realsense:
    serial:
    width: 640
    height: 480
    fps: 30
    enable_color: true
    enable_depth: true
    align_depth_to_color: true

tactile:
  enabled: true
  driver: mock
  xense:
    device_id:
    ip_address:
    mac_addr:
    config_path:
    video_path:
    use_gpu: false

